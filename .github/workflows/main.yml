name: Upstream Sync & Deploy

permissions:
  contents: write

on:
  schedule:
    - cron: "0 4 * * *" # 定时执行 At 04:00, every day
  workflow_dispatch:

jobs:
  sync_latest_from_upstream:
    name: Sync latest commits from upstream repo
    runs-on: ubuntu-latest
    if: ${{ github.event.repository.fork }}
    outputs:
      has_new_commits: ${{ steps.sync.outputs.has_new_commits }}

    steps:
      # Step 1: run a standard checkout action
      - name: Checkout target repo
        uses: actions/checkout@v4

      # Step 2: run the sync action
      - name: Sync upstream changes
        id: sync
        uses: aormsby/Fork-Sync-With-Upstream-action@v3.4
        with:
          upstream_sync_repo: Gzh0821/pvzge_web # 上游仓库名
          upstream_sync_branch: master             # 上游分支名
          target_sync_branch: master               # 当前分支名
          target_repo_token: ${{ secrets.GITHUB_TOKEN }} # automatically generated, no need to set

          # Set test_mode true to run tests instead of the true action!!
          test_mode: false

      - name: Sync check
        if: failure()
        run: |
          echo "[Error] Due to a change in the workflow file of the upstream repository, GitHub has automatically suspended the scheduled automatic update. You need to manually sync your fork."
          exit 1

  deploy:
    name: Deploy to Cloudflare Workers
    needs: sync_latest_from_upstream
    runs-on: ubuntu-latest
    # 同步成功后部署；手动触发时始终部署
    if: |
      always() &&
      needs.sync_latest_from_upstream.result == 'success' &&
      (needs.sync_latest_from_upstream.outputs.has_new_commits == 'true' || github.event_name == 'workflow_dispatch')

    steps:
      - name: Checkout repo (latest master)
        uses: actions/checkout@v4
        with:
          ref: master

      # ---- Step 1: 上传静态资源到 S3 ----
      # 使用 rclone 替代 aws-cli，因为 aws-cli v2.34+ 对第三方 S3 端点有已知 bug
      # (aws/aws-cli#10161: 空 <Message/> XML 导致 NoneType 崩溃)
      - name: Install rclone
        run: |
          curl -O https://downloads.rclone.org/v1.68.2/rclone-v1.68.2-linux-amd64.deb
          sudo dpkg -i rclone-v1.68.2-linux-amd64.deb
          rm rclone-v1.68.2-linux-amd64.deb

      - name: Upload docs to S3
        env:
          RCLONE_CONFIG_S3_TYPE: s3
          RCLONE_CONFIG_S3_PROVIDER: Other
          RCLONE_CONFIG_S3_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY_ID }}
          RCLONE_CONFIG_S3_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_ACCESS_KEY }}
          RCLONE_CONFIG_S3_ENDPOINT: ${{ secrets.S3_ENDPOINT }}
          RCLONE_CONFIG_S3_REGION: ${{ secrets.S3_REGION }}
        run: |
          rclone sync docs/ s3:${{ secrets.S3_BUCKET }}/ \
            --transfers 16 \
            --checkers 32 \
            --s3-no-check-bucket \
            --no-update-modtime \
            -v

      # ---- Step 2: 部署 Cloudflare Worker ----
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Worker dependencies
        working-directory: worker
        run: npm install

      - name: Configure custom domain
        working-directory: worker
        env:
          APP_URL: ${{ secrets.CLOUDFLARE_APP_URL }}
        run: |
          if [ -n "$APP_URL" ]; then
            # 从域名中提取 zone_name（取最后两段，如 play.hi168.com → hi168.com）
            ZONE_NAME=$(echo "$APP_URL" | awk -F. '{print $(NF-1)"."$NF}')
            echo "" >> wrangler.toml
            echo "routes = [" >> wrangler.toml
            echo "  { pattern = \"${APP_URL}/*\", zone_name = \"${ZONE_NAME}\" }" >> wrangler.toml
            echo "]" >> wrangler.toml
            echo "Configured route: ${APP_URL}/* (zone: ${ZONE_NAME})"
          else
            echo "No CLOUDFLARE_APP_URL set, deploying to workers.dev only"
          fi

      - name: Deploy Worker
        working-directory: worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_WORKER_API }}
        run: |
          npx wrangler deploy \
            --var S3_ENDPOINT:"${{ secrets.S3_ENDPOINT }}" \
            --var S3_BUCKET:"${{ secrets.S3_BUCKET }}" \
            --var S3_REGION:"${{ secrets.S3_REGION }}" \
            --var CACHE_TTL:"86400"

      - name: Set Worker secrets
        working-directory: worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_WORKER_API }}
        run: |
          echo "${{ secrets.S3_ACCESS_KEY_ID }}" | npx wrangler secret put S3_ACCESS_KEY_ID
          echo "${{ secrets.S3_SECRET_ACCESS_KEY }}" | npx wrangler secret put S3_SECRET_ACCESS_KEY
